specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Interface Inc
providerId: interface
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Flooring
  - Commercial
description: 'FOCUS-aligned FinOps placeholder for Interface Inc: a commercial flooring manufacturer
  with no public API or rate card. FinOps applies primarily to internal IT spend and partner integration
  cost rather than a public API surface.'
notes: Interface Inc does not publish a public API rate card. Meters below model the typical partner-integration
  surface; cannot be reconciled without a customer contract.
sources:
  - https://www.interface.com
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Interface, Inc.
serviceCategory: Commercial Flooring
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
focusColumns:
  ServiceName: Interface Inc
  ServiceCategory: Commercial Flooring
  ProviderName: Interface Inc
  PublisherName: Interface, Inc.
  InvoiceIssuerName: Interface, Inc.
  BillingCurrency: USD
meters:
  - name: integration_subscription
    unit: month
    aggregation: sum
    dimensions:
      - partner
      - integration_type
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
principles:
  - name: Visibility
    description: Track partner integration invoices and shared EDI VAN charges; there is no public
      Interface usage API.
  - name: Allocation
    description: Allocate integration subscription cost to the partner program / customer account that
      drives it.
  - name: Optimization
    description: Consolidate EDI partners and shared mappings; review contract scope at renewal.
  - name: Accountability
    description: Partner integration owner reviews integration usage and contract renewals annually.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
